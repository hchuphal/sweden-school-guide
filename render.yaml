services:
  - type: web
    name: sweden-school-guide
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SCHOOLGUIDE_DB_PATH
        value: data/schoolguide.sqlite
      - key: DEFAULT_YEAR_MODE
        value: current

      - key: AUTO_IMPORT_SCHOOL_REGISTRY
        value: "true"
      - key: AUTO_IMPORT_SKOLENKATEN
        value: "true"
